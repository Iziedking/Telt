# One command brings up the whole stack: `docker compose up`.
#
# Postgres is published on host port 5433 (not the default 5432) so it never
# collides with a local Postgres. Inside the compose network the backend reaches it
# at postgres:5432. The backend boots, applies the schema, then serves on :8787.
#
# Secrets (ANTHROPIC_API_KEY, SUI_PRIVATE_KEY, MEMWAL_*) come from backend/.env.
# Copy backend/.env.example to backend/.env and fill it in before `up`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: telt
      POSTGRES_PASSWORD: telt
      POSTGRES_DB: telt
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - telt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telt -d telt"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override the .env DATABASE_URL: inside the network the host is `postgres`.
      DATABASE_URL: postgres://telt:telt@postgres:5432/telt
      PORT: "8787"
    restart: unless-stopped
    ports:
      # Bind to localhost so the API is only reachable through nginx (which adds TLS). Still
      # http://localhost:8787 for local dev.
      - "127.0.0.1:8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      # Picked up by the autoheal sidecar below: restart this container if it goes unhealthy.
      - autoheal=true
    healthcheck:
      # Hit /health with node's built-in fetch (no curl/wget needed in the slim image).
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s # give the schema migrate + boot time before the first check

  # Watches for containers labelled autoheal=true that report unhealthy and restarts them. Plain
  # compose only marks health, it does not act on it, so this is what makes Docker "self-heal".
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  telt_pgdata:
