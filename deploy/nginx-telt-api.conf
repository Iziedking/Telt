# Nginx reverse proxy for the Telt backend, with WebSocket support for /ws.
#
# 1) Replace api.YOURDOMAIN.com with your API subdomain and point its DNS A record at the VPS.
# 2) Copy to /etc/nginx/sites-available/telt-api, symlink into sites-enabled.
# 3) sudo nginx -t && sudo systemctl reload nginx
# 4) sudo certbot --nginx -d api.YOURDOMAIN.com   (adds the TLS / port 443 server + redirect)
#
# The map below must live in the http {} context; a file in sites-enabled is included there, so
# it is fine here.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.YOURDOMAIN.com;

    # Allow large-ish bodies (anchoring payloads etc.)
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        # WebSocket upgrade for /ws
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts: matches can run for a while and the WS stays open.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
