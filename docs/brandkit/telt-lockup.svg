<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 168" width="360" height="168" role="img" aria-label="telt">
  <!-- Circular t-in-ring emblem: ring and t in the ink, the dot in Signal red -->
  <g transform="translate(34 32) scale(0.92)">
    <circle cx="52" cy="52" r="48" fill="none" stroke="#14181F" stroke-width="6"/>
    <g transform="translate(23 21) scale(0.6)" fill="#14181F">
      <rect x="9" y="32" width="62" height="17" rx="4"/>
      <path d="M28 8 L50 8 L50 70 C50 84 59 90 71 84 C65 95 47 97 38 86 C33 80 30 74 28 65 Z"/>
      <circle cx="82" cy="85" r="9" fill="#c4241c"/>
    </g>
  </g>
  <!-- Wordmark in Fredoka (needs the font), lowercase, with the red final t -->
  <text x="150" y="100" font-family="Fredoka, 'Segoe UI', sans-serif" font-weight="700" font-size="60">
    <tspan fill="#14181F">tel</tspan><tspan fill="#c4241c">t</tspan>
  </text>
</svg>
